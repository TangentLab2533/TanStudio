[如何提高工作效率？]
num = 1
cotent = 如果你提高工作效率还只是靠一个网页版的AI或者你只知道应该使用AI，那你就太落后了。\
在当下这个AI涌现的时代，要想要提高自己的工作效率，就必须得有“链”的意识，你的AI不能独立于工具工作，而是必须要接入类似于ClaudeCode或者Codex这样的应用，才能发挥最大的价值。 \
我曾经也是用网页版AI，那时候编程只能做小项目而且效率十分低下，一个简单的项目，十几个小时未必能搞完。但是自从接入ClaudeCode，我的编程效率产生了质的飞跃，比方说我自己的github开源的pdfcli，就完美诠释了这一点，这一个内置二百多个pdf的命令行工具，AI仅在2小时内就完成了。 \
所以，要把AI与工具相结合，才能真正爆发出其潜力。

[TanStudio的优势]
num = 2
content = 中转站这种东西，最初是为开发者提供服务的。非开发者往往只需要用免费的豆包就可以满足日常需求了。 \
而我们的目标，就是把中转站——拉下神坛。 \
我们要让中转站真正为每一个学生、员工服务。 \
我们提供了最简单的聚合调用模式，1key 1url，你就可以走遍天下。

[我们的规划与未来]
num = 3
content = 正切工作室（TanStudio）是三个一零后一手创办的。我们最不缺的就是机会与对未来的期许。 \
中转站不是我们的重点，恰恰相反，那是我们的起点。 \
ClaudeCode不是我们中转站的唯一使用场景。中转站之后，我们会把AI与别的工具深度融合，例如OpenClaw，让AI真正融入每一个人的生活；让新技术浇灌每一个想要进取的灵魂！ \
TanClaw，敬请期待。